name:  run Excel_converter.py

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 6,0,1' # At 03:00, Monday  (La hora depende de la localización del servidor)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - id: convert
        env:
          INVOICING_BOOK_URL: ${{ secrets.INVOICING_BOOK_URL }}
        run: |
          OUTPUT_FILE=$(python Others/Excel_converter.py | tail -n 1)
          echo "output_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT

      - name: List files for debugging
        run: ls -la

      - name: Upload File to Dropbox
        uses: ./upload-dropbox-action
        with:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          SOURCE_PATH: ${{ steps.convert.outputs.output_file }}
          DEST_PATH: /carpeta_de_prueba/${{ steps.convert.outputs.output_file }}
