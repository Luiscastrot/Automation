name: invoicng_book.yml

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 6,0,1'  # At 10:00 UTC on Saturday, Sunday, Monday

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Convert XLSB to XLSX
        env:
          INVOICING_BOOK_URL: ${{ secrets.INVOICING_BOOK_URL }}
          TARGET_FOLDER: ""  # Optional: specify folder if needed
        run: python Others/Excel_converter.py

      - name: List files for debugging
        run: ls -la

      - name: Upload converted file to Dropbox
        uses: ./upload-dropbox-action
        with:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          SOURCE_PATH: ${{ github.workspace }}/converted_output.xlsx
          DEST_PATH: /carpeta_de_prueba/converted_output.xlsx
